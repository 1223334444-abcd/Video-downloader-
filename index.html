<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download videos from direct URLs with ease">
    <meta name="theme-color" content="#667eea">
    <title>Video Downloader</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100'/><text x='50%' y='50%' font-size='60' fill='white' text-anchor='middle' dy='.3em' font-weight='bold'>📥</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #urlInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5ee;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        #urlInput:focus {
            border-color: #667eea;
        }
        #fetchBtn {
            padding: 15px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        #fetchBtn:hover:not(:disabled) {
            background: #5568d3;
        }
        #fetchBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result-area {
            display: none;
            margin-top: 20px;
        }
        .video-preview {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .video-preview video {
            width: 100%;
            display: block;
            max-height: 300px;
        }
        .info-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-label {
            color: #666;
            font-weight: 500;
        }
        .info-value {
            color: #333;
            font-weight: 600;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }
        .download-btn {
            width: 100%;
            padding: 15px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background: #38a169;
        }
        .download-btn:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        .direct-link-section {
            margin-top: 15px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 10px;
            border-left: 4px solid #f59e0b;
        }
        .direct-link-section h4 {
            color: #92400e;
            margin-bottom: 10px;
            font-size: 14px;
        }
        #directUrl {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
            font-family: monospace;
        }
        .copy-btn {
            padding: 8px 15px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }
        .copy-btn:hover {
            background: #d97706;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #e53e3e;
            text-align: center;
            padding: 10px;
            background: #fed7d7;
            border-radius: 8px;
            display: none;
            margin-bottom: 15px;
            border-left: 4px solid #e53e3e;
        }
        .install-prompt {
            display: none;
            background: #e6f2ff;
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .install-prompt button {
            margin-top: 10px;
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        .success-msg {
            display: none;
            color: #22863a;
            text-align: center;
            padding: 10px;
            background: #f0f8f4;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Video Downloader</h1>
            <p>Download videos from direct URLs</p>
        </div>
        
        <div id="installPrompt" class="install-prompt">
            <p>Install this app to your device for quick access!</p>
            <button onclick="installApp()">Install App</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com/video.mp4">
            <button id="fetchBtn" onclick="fetchVideo()">Fetch</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching video info...</p>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
        
        <div class="result-area" id="resultArea">
            <div class="video-preview">
                <video id="videoPreview" controls crossorigin="anonymous"></video>
            </div>
            
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">Filename:</span>
                    <span class="info-value" id="filename">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Size:</span>
                    <span class="info-value" id="filesize">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Type:</span>
                    <span class="info-value" id="filetype">-</span>
                </div>
            </div>
            
            <button class="download-btn" id="downloadBtn" onclick="downloadVideo()">⬇ Download Video</button>
            
            <div class="direct-link-section">
                <h4>💡 Direct Download Link</h4>
                <input type="text" id="directUrl" readonly>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://video-dl-backend.onrender.com';
        let currentVideoUrl = '';
        let currentFilename = '';
        let deferredPrompt;

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.log('❌ Service Worker failed:', err));
            });
        }

        // PWA Install Prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        showSuccess('App installed successfully!');
                    }
                    deferredPrompt = null;
                    document.getElementById('installPrompt').style.display = 'none';
                });
            }
        }

        async function fetchVideo() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showError('Please enter a video URL');
                return;
            }

            if (!isValidUrl(url)) {
                showError('Please enter a valid URL');
                return;
            }

            try {
                showLoading(true);
                hideError();
                hideResult();

                const response = await fetch(`${BACKEND_URL}/api/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url }),
                    signal: AbortSignal.timeout(10000) // 10s timeout
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: 'Network error' }));
                    throw new Error(errorData.error || 'Failed to fetch video');
                }

                const data = await response.json();
                
                currentVideoUrl = data.downloadUrl;
                currentFilename = data.title || 'video.mp4';
                
                document.getElementById('videoPreview').src = currentVideoUrl;
                document.getElementById('filename').textContent = data.title || 'Unknown';
                document.getElementById('filesize').textContent = data.size || 'Unknown';
                document.getElementById('filetype').textContent = data.format || 'Unknown';
                document.getElementById('directUrl').value = currentVideoUrl;
                
                showResult(true);
                showSuccess('Video loaded successfully!');
                
            } catch (error) {
                console.error('Error:', error);
                showError(`Error: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        async function downloadVideo() {
            if (!currentVideoUrl) return;
            
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = '⬇ Downloading...';

            try {
                const response = await fetch(currentVideoUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = currentFilename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                showSuccess('Download started!');
            } catch (error) {
                console.error('Download error:', error);
                window.open(currentVideoUrl, '_blank');
                showSuccess('Opened in new tab');
            } finally {
                btn.disabled = false;
                btn.textContent = '⬇ Download Video';
            }
        }

        function copyLink() {
            const directUrl = document.getElementById('directUrl');
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(directUrl.value).then(() => {
                    const copyBtn = document.querySelector('.copy-btn');
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => { copyBtn.textContent = '📋 Copy Link'; }, 2000);
                });
            } else {
                // Fallback for older browsers
                directUrl.select();
                document.execCommand('copy');
                const copyBtn = document.querySelector('.copy-btn');
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => { copyBtn.textContent = '📋 Copy Link'; }, 2000);
            }
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return false;
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('fetchBtn').disabled = show;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            hideSuccess();
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMsg');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => hideSuccess(), 3000);
        }

        function hideSuccess() {
            document.getElementById('successMsg').style.display = 'none';
        }

        function showResult(show) {
            document.getElementById('resultArea').style.display = show ? 'block' : 'none';
        }

        function hideResult() {
            document.getElementById('resultArea').style.display = 'none';
        }

        // Keyboard shortcut
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideo();
        });
    </script>
</body>
</html>
