<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #urlInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5ee;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
        }
        #urlInput:focus {
            border-color: #667eea;
        }
        #fetchBtn {
            padding: 15px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        #fetchBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result-area {
            display: none;
            margin-top: 20px;
        }
        .video-preview video {
            width: 100%;
            border-radius: 12px;
            background: #000;
        }
        .info-card {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-label {
            color: #666;
            font-size: 13px;
        }
        .info-value {
            color: #333;
            font-size: 13px;
            font-weight: 600;
        }
        .download-btn {
            width: 100%;
            padding: 15px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }
        .direct-link-section {
            margin-top: 15px;
            padding: 15px;
            background: #fef3c7;
            border-radius: 10px;
            border-left: 4px solid #f59e0b;
        }
        .direct-link-section h4 {
            color: #92400e;
            margin-bottom: 10px;
            font-size: 14px;
        }
        #directUrl {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .copy-btn {
            padding: 8px 15px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-msg {
            color: #e53e3e;
            text-align: center;
            padding: 10px;
            background: #fed7d7;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Video Downloader</h1>
            <p>Paste a direct video URL to download</p>
        </div>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="https://example.com/video.mp4">
            <button id="fetchBtn" onclick="fetchVideo()">Fetch</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching video info...</p>
        </div>
        
        <div class="error-msg" id="errorMsg"></div>
        
        <div class="result-area" id="resultArea">
            <div class="video-preview">
                <video id="videoPreview" controls crossorigin="anonymous"></video>
            </div>
            
            <div class="info-card">
                <div class="info-item">
                    <span class="info-label">Filename:</span>
                    <span class="info-value" id="filename">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Size:</span>
                    <span class="info-value" id="filesize">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Type:</span>
                    <span class="info-value" id="filetype">-</span>
                </div>
            </div>
            
            <button class="download-btn" onclick="downloadVideo()">⬇ Download Video</button>
            
            <div class="direct-link-section">
                <h4>💡 Direct Download Link</h4>
                <input type="text" id="directUrl" readonly>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://video-dl-backend.onrender.com';
        let currentVideoUrl = '';
        let currentFilename = '';

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }

        async function fetchVideo() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showError('Please enter a video URL');
                return;
            }

            try {
                showLoading(true);
                hideError();
                hideResult();

                const response = await fetch(`${BACKEND_URL}/api/info`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to fetch video');
                }

                const data = await response.json();
                
                currentVideoUrl = data.downloadUrl;
                currentFilename = data.title || 'video.mp4';
                
                document.getElementById('videoPreview').src = currentVideoUrl;
                document.getElementById('filename').textContent = data.title || 'Unknown';
                document.getElementById('filesize').textContent = data.size || 'Unknown';
                document.getElementById('filetype').textContent = data.format || 'Unknown';
                document.getElementById('directUrl').value = currentVideoUrl;
                
                showResult(true);
                
            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        async function downloadVideo() {
            if (!currentVideoUrl) return;
            try {
                const response = await fetch(currentVideoUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = currentFilename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                window.open(currentVideoUrl, '_blank');
            }
        }

        function copyLink() {
            const directUrl = document.getElementById('directUrl');
            directUrl.select();
            document.execCommand('copy');
            const copyBtn = document.querySelector('.copy-btn');
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => { copyBtn.textContent = '📋 Copy Link'; }, 2000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('fetchBtn').disabled = show;
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function hideError() {
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showResult(show) {
            document.getElementById('resultArea').style.display = show ? 'block' : 'none';
        }

        function hideResult() {
            document.getElementById('resultArea').style.display = 'none';
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideo();
        });
    </script>
</body>
</html>
